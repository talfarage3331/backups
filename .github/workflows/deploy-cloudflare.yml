name: Deploy — Cloudflare Pages (Web Dashboard)

on:
  push:
    branches: ['main']           # Auto-deploy to production on every main push
  pull_request:
    branches: ['main']           # Deploy preview for every PR targeting main
  workflow_dispatch:             # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read
  deployments: write             # Required by Cloudflare Pages action
  pull-requests: write           # Required to post preview URL comment on PR

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Single job: Build then Deploy in the same runner so paths are guaranteed
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web dashboard
        run: pnpm --filter web build
        env:
          # Firebase config — add these in GitHub → Settings → Secrets → Actions
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Verify dist output exists
        run: |
          echo "Checking build output..."
          ls -la apps/web/dist/
          echo "✅ dist directory confirmed at: $GITHUB_WORKSPACE/apps/web/dist"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Use absolute path via GITHUB_WORKSPACE to eliminate any path ambiguity
          command: pages deploy ${{ github.workspace }}/apps/web/dist --project-name=envshield-web --commit-dirty=true
